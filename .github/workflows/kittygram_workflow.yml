name: Main Kittygram workflow

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - '.gitignore'

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    env:
      KT__DJANGO__SECRET_KEY: test-secret-key
      KT__POSTGRES__PASSWORD: postgres
    services:
      postgres:
        image: postgres:17.8-alpine3.23
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: kittygram
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"
      - name: Install dependencies
        run: uv sync --frozen
      - name: Ruff
        run: uv run ruff check . --fix
      - name: Pyright
        run: uv run pyright
      - name: Test files via pytest
        run: uv run pytest ../tests/test_files.py
      - name: Django tests
        run: uv run python manage.py test
  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up nodeJS
        uses: actions/setup-node@v6
        with:
          node-version: 18
      - name: Install dependencies
        run: |
          cd frontend/
          npm ci
      - name: Test frontend
        run: |
          cd frontend/
          npm run test
  build-and-push:
    runs-on: ubuntu-latest
    needs: [ backend-tests, frontend-tests ]
    strategy:
      matrix:
        component: [ backend, frontend, gateway ]
        include:
          - component: backend
            context: ./backend/
            tag: kittygram_backend
          - component: frontend
            context: ./frontend/
            tag: kittygram_frontend
          - component: gateway
            context: ./nginx/
            tag: kittygram_gateway
    steps:
      - uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/${{ matrix.tag }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v6
      - name: Copy configs to VPS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          passphrase: ${{ secrets.PASSPHRASE }}
          port: ${{ secrets.PORT }}
          source: "docker-compose.production.yml"
          target: "/opt/kittygram"
      - name: Create .env and restart images
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          passphrase: ${{ secrets.PASSPHRASE }}
          port: ${{ secrets.PORT }}
          script: |
            cat > /opt/kittygram/.env  << 'EOF'
            KT__DJANGO__SECRET_KEY=${{ secrets.KT__DJANGO__SECRET_KEY }}
            KT__DJANGO__DOMAIN=${{ secrets.KT__DJANGO__DOMAIN }}
            KT__DJANGO__HEALTHCHECK_PATH=${{ secrets.KT__DJANGO__HEALTHCHECK_PATH }}
            KT__DJANGO__ADMIN_PATH=${{ secrets.KT__DJANGO__ADMIN_PATH }}
            KT__POSTGRES__DB=${{ secrets.KT__POSTGRES__DB }}
            KT__POSTGRES__USER=${{ secrets.KT__POSTGRES__USER }}
            KT__POSTGRES__PASSWORD=${{ secrets.KT__POSTGRES__PASSWORD }}
            KT__POSTGRES__PORT=${{ secrets.KT__POSTGRES__PORT }}
            EOF
            cd /opt/kittygram
            docker compose -f docker-compose.production.yml pull
            docker compose -f docker-compose.production.yml up -d --remove-orphans
            docker image prune -af
  post-deploy-tests:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Check out code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: pip install pytest requests PyYAML
      - name: Wait for services to be ready
        run: |
          echo "Waiting for services to become available..."
          for i in $(seq 1 12); do
            if curl -sf --max-time 5 "https://${{ secrets.KT__DJANGO__DOMAIN }}" > /dev/null 2>&1; then
              echo "Service is up after $((i * 5))s"
              break
            fi
            echo "Attempt $i/12: not ready yet, retrying in 5s..."
            sleep 5
          done
      - name: Run post-deploy tests
        run: pytest tests/test_connection.py tests/test_dockerhub_images.py -v --tb=short
  notify:
    runs-on: ubuntu-latest
    needs: post-deploy-tests
    if: always()
    steps:
      - name: Notify success
        if: needs.post-deploy-tests.result == 'success'
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            Kittygram deployed successfully!
            Commit: ${{ github.event.head_commit.message }}
            Author: ${{ github.event.head_commit.author.name }}
      - name: Notify failure
        if: needs.post-deploy-tests.result != 'success'
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            Deploy failed!
            Commit: ${{ github.event.head_commit.message }}
            Info: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}