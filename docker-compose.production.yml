services:
  kittygram_postgres:
    image: postgres:17.8-alpine3.23
    container_name: kittygram_postgres_container
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${KT__POSTGRES__USER}
      POSTGRES_PASSWORD: ${KT__POSTGRES__PASSWORD}
      POSTGRES_DB: ${KT__POSTGRES__DB}
    networks:
      - postgres_network
    volumes:
      - pg_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 512M
    command: >
              postgres
              -c max_connections=20
              -c shared_buffers=128MB
              -c work_mem=4MB
              -c maintenance_work_mem=32MB
              -c effective_cache_size=384MB
              -c wal_buffers=4MB
              -c checkpoint_completion_target=0.9
              -c random_page_cost=1.1
    stop_grace_period: 30s
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  kittygram_backend:
    image: warrior88888/kittygram_backend
    container_name: kittygram_backend
    env_file:
      - .env
    environment:
      KT__DJANGO__DEBUG: "False"
      KT__POSTGRES__HOST: "kittygram_postgres"
    networks:
      - backend_network
      - postgres_network
    volumes:
      - static:/app/collected_static/
      - media:/app/media/
    depends_on:
      kittygram_postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    image: warrior88888/kittygram_frontend
    restart: on-failure
    volumes:
      - frontend_static:/frontend_static

  kittygram_gateway:
    image: warrior88888/kittygram_gateway
    environment:
      ADMIN_URL: ${KT__DJANGO__ADMIN_PATH}
    restart: unless-stopped
    networks:
      - backend_network
      - proxy_network
    volumes:
      - static:/staticfiles/
      - frontend_static:/frontend/
      - media:/media/
    depends_on:
      kittygram_backend:
        condition: service_healthy
      frontend:
        condition: service_completed_successfully

networks:
  postgres_network:
    internal: true
  backend_network:
    internal: true
  proxy_network:
    external: true

volumes:
  pg_data:
  static:
  frontend_static:
  media:
